name: Release Publish

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: 20.19.0

jobs:
  publish:
    name: Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            publish_cmd: npm run dist:win:publish
          - os: ubuntu-latest
            publish_cmd: npm run dist:linux:publish

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate release tag matches package version
        if: github.event_name == 'release'
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); const tag=process.env.RELEASE_TAG; const expected='v'+pkg.version; if(tag!==expected){console.error('Release tag '+tag+' does not match package.json version '+pkg.version); process.exit(1);} console.log('Release tag/version OK: '+tag);"
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Setup Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential cmake python3 pkg-config libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build:addon

      - name: Build and publish release assets
        run: ${{ matrix.publish_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
